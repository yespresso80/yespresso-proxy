<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6d28d9">
<title>Yespresso HelpDesk Mobile</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f7fa; color:#1a1a2e; overscroll-behavior:none; }
body { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* Header */
.m-header { background:#fef3c7; padding:10px 14px; border-bottom:1px solid #fcd34d; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; position:sticky; top:0; z-index:100; }
.m-header-title { font-weight:600; color:#713f12; font-size:14px; display:flex; align-items:center; gap:8px; }
.m-header-btn { background:none; border:none; color:#92400e; font-size:16px; cursor:pointer; padding:4px 8px; font-weight:600; }
.m-logout { background:none; border:none; color:#92400e; font-size:12px; cursor:pointer; padding:4px 8px; }

/* Search bar */
.m-search { background:#f8f9fc; padding:8px 12px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.m-search input { flex:1; padding:8px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:13px; font-family:inherit; outline:none; background:#fff; }
.m-search input:focus { border-color:#6d28d9; }

/* Counter bar */
.m-counter { padding:8px 14px; background:#e8f0fe; border-bottom:1px solid #bfdbfe; font-size:12px; color:#1a4b8f; font-weight:500; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.m-counter-refresh { background:none; border:none; color:#1a4b8f; font-size:14px; cursor:pointer; padding:0 4px; }

/* Content area */
.m-content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; background:#fff; }

/* Ticket list */
.m-ticket-row { padding:12px 14px; border-bottom:1px solid #f0f2f5; background:#fff; cursor:pointer; transition:background .15s; }
.m-ticket-row:active { background:#f8f9fc; }
.m-ticket-row.active { background:#f0f4ff; border-left:3px solid #6d28d9; padding-left:11px; }
.m-ticket-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:4px; }
.m-avatar { width:32px; height:32px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
.m-ticket-info { flex:1; min-width:0; }
.m-ticket-name-row { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.m-ticket-name { font-size:13px; font-weight:600; color:#1a1a2e; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.m-ticket-time { font-size:10px; color:#888; flex-shrink:0; }
.m-ticket-subj { font-size:11px; color:#666; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.m-ticket-badges { display:flex; gap:5px; margin-top:6px; margin-left:42px; flex-wrap:wrap; }
.m-badge { padding:2px 7px; border-radius:10px; font-size:10px; font-weight:500; white-space:nowrap; }
.m-badge-amazon { background:#fff4e0; color:#a64500; }
.m-badge-temu { background:#fff8f0; color:#c04400; }
.m-badge-sito { background:#f0fdf4; color:#166534; }
.m-badge-brt { background:#fff7ed; color:#c2410c; }
.m-badge-thread { background:#e8f0fe; color:#1a4b8f; }
.m-badge-open { background:#fee; color:#c04040; }
.m-badge-pending { background:#fff8e1; color:#d97706; }

/* Empty state */
.m-empty { padding:60px 20px; text-align:center; color:#aaa; font-size:13px; }

/* Loading */
.m-loading { padding:40px 20px; text-align:center; color:#888; font-size:12px; }
.m-spinner { display:inline-block; width:24px; height:24px; border:3px solid #e5e7eb; border-top-color:#6d28d9; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:10px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Detail view */
.m-detail-header { background:#fff; padding:10px 12px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:50; }
.m-back { background:none; border:none; color:#1a73e8; font-size:22px; cursor:pointer; padding:0; font-weight:500; line-height:1; }
.m-detail-title { flex:1; min-width:0; }
.m-detail-name { font-size:13px; font-weight:600; color:#1a1a2e; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.m-detail-sub { font-size:10px; color:#888; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Order info box */
.m-order-box { background:#fff; padding:10px 12px; border-bottom:1px solid #e5e7eb; }
.m-order-card { background:#f8f9fc; border-radius:8px; padding:9px 10px; margin-bottom:6px; }
.m-order-label { font-size:9px; color:#888; font-weight:500; text-transform:uppercase; margin-bottom:2px; }
.m-order-value { font-size:12px; color:#1a1a2e; font-weight:500; font-family:ui-monospace,Menlo,monospace; }
.m-order-badges { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.m-order-badge { padding:8px; border-radius:6px; font-size:10px; font-weight:500; text-align:center; text-decoration:none; }

/* Summary AI box */
.m-summary { padding:11px 12px; background:#fefbf3; border-bottom:1px solid #e5e7eb; }
.m-summary-label { font-size:9px; color:#92400e; font-weight:500; text-transform:uppercase; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.m-summary-text { font-size:13px; color:#1a1a2e; line-height:1.5; }

/* Last message box */
.m-lastmsg { padding:10px 12px; background:#fff; border-bottom:1px solid #e5e7eb; }
.m-lastmsg-label { font-size:9px; color:#888; font-weight:500; text-transform:uppercase; margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; }
.m-lastmsg-link { background:none; border:none; color:#1a73e8; font-size:10px; font-weight:500; cursor:pointer; padding:0; }
.m-lastmsg-text { font-size:13px; color:#1a1a2e; line-height:1.5; white-space:pre-wrap; word-wrap:break-word; }

/* Attachments thumbnails */
.m-attach { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.m-attach-thumb { width:60px; height:60px; border-radius:6px; border:1px solid #ddd; cursor:pointer; overflow:hidden; position:relative; background:#f0f2f5; }
.m-attach-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.m-attach-count { position:absolute; bottom:3px; right:3px; background:rgba(0,0,0,0.6); color:#fff; font-size:9px; padding:1px 4px; border-radius:3px; }

/* Reply area */
.m-reply { padding:12px; background:#fff; border-top:1px solid #e5e7eb; }
.m-reply-textarea { width:100%; min-height:120px; border:1px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px; line-height:1.5; resize:none; font-family:inherit; color:#1a1a2e; outline:none; }
.m-reply-textarea:focus { border-color:#6d28d9; }

/* AI generated banner */
.m-ai-banner { padding:8px 12px; background:#f0fdf4; border-bottom:1px solid #86efac; font-size:11px; color:#166534; display:flex; align-items:center; gap:6px; }

/* Footer actions */
.m-footer { background:#fff; border-top:1px solid #e5e7eb; padding:10px 12px; display:flex; gap:8px; flex-shrink:0; }
.m-footer-btn { padding:12px 14px; border:1px solid #e5e7eb; border-radius:8px; background:#fff; color:#6b7280; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; min-height:44px; }
.m-footer-btn-primary { flex:1; background:#6d28d9; color:#fff; border:none; }
.m-footer-btn-success { flex:1; background:#16a34a; color:#fff; border:none; }

/* Action buttons row */
.m-action-row { padding:4px 12px 8px; display:flex; gap:6px; background:#fff; border-top:1px solid #f0f2f5; }
.m-action-btn { flex:1; background:#fff; color:#1a1a2e; border:1px solid #e5e7eb; border-radius:8px; padding:9px; font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; min-height:38px; }
.m-action-btn-suggest { background:#f3e8ff; color:#7e22ce; border:1.5px solid #d8b4fe; }

/* Login screen */
.m-login { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; padding:20px; background:linear-gradient(180deg,#fef3c7 0%,#fff 40%); }
.m-login-logo { font-size:40px; margin-bottom:12px; }
.m-login-title { font-size:20px; font-weight:600; color:#1a1a2e; margin-bottom:4px; }
.m-login-sub { font-size:12px; color:#888; margin-bottom:30px; }
.m-login-form { width:100%; max-width:320px; display:flex; flex-direction:column; gap:12px; }
.m-login-input { padding:14px 16px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; font-family:inherit; outline:none; }
.m-login-input:focus { border-color:#6d28d9; }
.m-login-btn { padding:14px; background:#6d28d9; color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; min-height:48px; }
.m-login-error { color:#dc2626; font-size:12px; text-align:center; margin-top:4px; min-height:16px; }

/* Toast */
.m-toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; z-index:10000; box-shadow:0 4px 16px rgba(0,0,0,0.3); animation:toast-in 0.2s ease-out; }
.m-toast-success { background:#16a34a; }
.m-toast-error { background:#dc2626; }
@keyframes toast-in { from { opacity:0; transform:translate(-50%,20px); } to { opacity:1; transform:translate(-50%,0); } }

/* Image viewer */
.m-img-viewer { position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; }
.m-img-viewer-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.m-img-viewer-close { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; }
.m-img-viewer-counter { color:#fff; font-size:12px; opacity:0.8; }
.m-img-viewer-body { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.m-img-viewer-body img { max-width:100%; max-height:100%; object-fit:contain; }
.m-img-viewer-nav { padding:16px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.m-img-nav-btn { background:rgba(255,255,255,0.1); color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:14px; cursor:pointer; min-height:44px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Yespresso HelpDesk Mobile — Fase 1
// ═══════════════════════════════════════════════════════════════════
const HD_TOKEN = "{{HD_TOKEN}}";
const PROXY_TOKEN = "{{PROXY_TOKEN}}";
const PROXY = location.origin;

// State globale
const state = {
  loggedIn: false,
  tickets: [],
  currentTicket: null,
  currentTicketFull: null,
  shopifyOrder: null,
  view: 'login', // 'login' | 'list' | 'detail'
  loading: false,
  aiReply: '',
  aiSummary: '',
  searchQuery: '',
  sending: false,
  quickReplies: []  // caricato da /quick-replies
};

// Status labels
const STATUS_LABELS = { open:'Open', pending:'Pending', solved:'Solved', closed:'Closed' };

// ═══ UTILS ═══
function $(id){ return document.getElementById(id); }
function h(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function avatarColor(name){
  const colors=['#c084fc','#86efac','#fda4af','#93c5fd','#fcd34d','#a78bfa','#67e8f9'];
  let hash=0;
  for(let i=0;i<(name||'').length;i++) hash=((hash<<5)-hash)+name.charCodeAt(i);
  return colors[Math.abs(hash)%colors.length];
}
function initials(name){
  if(!name) return '?';
  const parts=name.trim().split(/\s+/);
  if(parts.length===1) return parts[0].substring(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function timeAgo(ts){
  if(!ts) return '';
  const d=new Date(ts); if(isNaN(d.getTime())) return '';
  const diff=Date.now()-d.getTime();
  const m=Math.floor(diff/60000);
  if(m<1) return 'ora';
  if(m<60) return m+'m';
  const hrs=Math.floor(m/60);
  if(hrs<24) return hrs+'h';
  const days=Math.floor(hrs/24);
  if(days<7) return days+'g';
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
}
function srcLabel(email){
  email=(email||'').toLowerCase();
  if(email.includes('marketplace.amazon')||email.includes('donotreply@amazon')) return {lbl:'Amazon',cls:'m-badge-amazon'};
  if(email.includes('temu')||email.includes('seller@orders')) return {lbl:'Temu',cls:'m-badge-temu'};
  if(email.includes('tiktok')) return {lbl:'TikTok',cls:'m-badge-temu'};
  if(email.includes('brt.it')||email.includes('vasnoreply')) return {lbl:'BRT',cls:'m-badge-brt'};
  return {lbl:'Sito',cls:'m-badge-sito'};
}

// Carica le risposte rapide dal server
async function loadQuickReplies(){
  try{
    const r = await fetch(PROXY+'/quick-replies');
    if(!r.ok) return;
    const data = await r.json();
    if(Array.isArray(data)) state.quickReplies = data;
    else if(data && Array.isArray(data.replies)) state.quickReplies = data.replies;
    console.log('[QR mobile] caricate', state.quickReplies.length, 'risposte rapide');
  }catch(e){ console.warn('[QR load]', e.message); }
}

// Rileva se è un ticket Temu post-vendita
function isTemuTicket(t){
  if(!t) return false;
  const email = (t.requester && t.requester.email || '').toLowerCase();
  const subj = (t.subject || '').toLowerCase();
  // Email Temu (seller@orders.temu.com) + subject che indica post-vendita
  if(!email.includes('orders.temu') && !email.includes('temu')) return false;
  return subj.includes('post-vendita') || subj.includes('notifica di ticket') || subj.includes('richiesta');
}

// Estrae il numero ordine Temu dal ticket (se presente)
function getTemuOrderNumber(t){
  if(!t) return '';
  const txt = ((t.subject||'') + ' ' + ((t.events||[]).map(e=>(e.message&&e.message.text)||'').join(' '))).substring(0,3000);
  // Pattern PO-211-XXXXXXXXXXXXXXXXX
  const m1 = txt.match(/PO[-\s](\d{3}-)?(\d{15,18})/i);
  if(m1) return m1[0].replace(/\s/g,'').toUpperCase();
  // Pattern parent_order_sn o note attributes su Shopify
  const order = state.shopifyOrder;
  if(order && order.note_attributes){
    const attr = order.note_attributes.find(a => ['PARENT_ORDER_SN','Temu Order Id','temu_order_id','Marketplace Order Id'].includes(a.name));
    if(attr) return attr.value;
  }
  return '';
}

function showToast(msg, type){
  const existing=document.querySelector('.m-toast');
  if(existing) existing.remove();
  const t=document.createElement('div');
  t.className='m-toast'+(type==='success'?' m-toast-success':type==='error'?' m-toast-error':'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ═══ Tracking invii WhatsApp giacenza (condiviso server) ═══
// La mappa è persistita su server → visibile a tutti gli agenti.
window._giacenzaWaSentCache = null;
window._giacenzaWaSentCacheTs = 0;

window.loadGiacenzaWaSent = async function(force){
  const now = Date.now();
  if(!force && window._giacenzaWaSentCache && (now - window._giacenzaWaSentCacheTs) < 60000){
    return window._giacenzaWaSentCache;
  }
  try{
    const r = await fetch(PROXY+'/giacenza-wa-sent');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    window._giacenzaWaSentCache = data || {};
    window._giacenzaWaSentCacheTs = now;
    console.log('[GWS mobile] cache caricata:', Object.keys(window._giacenzaWaSentCache).length, 'ticket con WA');
    return window._giacenzaWaSentCache;
  }catch(e){
    console.warn('[GWS load]', e.message);
    return window._giacenzaWaSentCache || {};
  }
};

window.setGiacenzaWaSent = async function(ticketId, phone){
  if(!ticketId) return;
  window._giacenzaWaSentCache = window._giacenzaWaSentCache || {};
  window._giacenzaWaSentCache[String(ticketId)] = { ts: new Date().toISOString(), phone: phone || '' };
  try{
    await fetch(PROXY+'/giacenza-wa-sent', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ ticketId: String(ticketId), phone: phone || '' })
    });
  }catch(e){ console.warn('[GWS save]', e.message); }
};

window.clearGiacenzaWaSent = async function(ticketId){
  if(!ticketId) return;
  if(window._giacenzaWaSentCache) delete window._giacenzaWaSentCache[String(ticketId)];
  try{
    await fetch(PROXY+'/giacenza-wa-sent?ticketId='+encodeURIComponent(String(ticketId)), {
      method:'DELETE'
    });
  }catch(e){ console.warn('[GWS delete]', e.message); }
};

window.isGiacenzaWaSent = function(ticketId){
  if(!ticketId) return false;
  const map = window._giacenzaWaSentCache || {};
  return !!map[String(ticketId)];
};

window.getGiacenzaWaSentMap = function(){
  return window._giacenzaWaSentCache || {};
};

// ═══ API WRAPPER (stessi pattern del desktop) ═══
// Wrapper con X-App-Token per tutte le chiamate
function proxyFetch(url, opts){
  opts = opts || {};
  opts.headers = opts.headers || {};
  if(PROXY_TOKEN) opts.headers["X-App-Token"] = PROXY_TOKEN;
  return fetch(url, opts);
}

// Chiamata API helpdesk (identica al desktop)
async function hdFetch(path, options){
  // path è del tipo "/tickets?..." o "/tickets/ID" ecc.
  // → URL diventa PROXY + "/api/v1" + path
  const url = PROXY + "/api/v1" + path;
  const headers = Object.assign({
    "Authorization": "Basic " + HD_TOKEN,
    "Content-Type": "application/json"
  }, (options||{}).headers||{});
  if(PROXY_TOKEN) headers["X-App-Token"] = PROXY_TOKEN;
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), 30000);
  try{
    const res = await fetch(url, Object.assign({}, options, {headers, signal:controller.signal}));
    clearTimeout(timer);
    if(!res.ok){
      const b = await res.text();
      console.error("[hdFetch 4xx/5xx]", res.status, path, b);
      throw new Error("Errore "+res.status+": "+b.substring(0,200));
    }
    const txt = await res.text();
    return txt ? JSON.parse(txt) : null;
  }catch(e){
    clearTimeout(timer);
    if(e.name === "AbortError") throw new Error("Timeout proxy (~15s avvio)");
    throw e;
  }
}

// Shopify fetch (identico al desktop)
async function shopifyGet(path){
  try{
    const res = await proxyFetch(PROXY+"/shopify/"+path);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){
    console.warn('[Shopify]', e.message);
    return null;
  }
}

// Anthropic con retry per 529 overload (identico al desktop)
async function anthropicFetch(body){
  for(let attempt=0; attempt<3; attempt++){
    const res = await proxyFetch(PROXY+"/anthropic/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    if(res.status !== 529) return res;
    console.log("[ANTHROPIC] 529 overload, retry "+(attempt+1)+"/3...");
    await new Promise(r => setTimeout(r, 4000*(attempt+1)));
  }
  return null;
}

// ═══ LOGIN ═══
function checkLogin(){
  // Se il server serve la pagina significa che siamo già autenticati via cookie
  // Però verifichiamo provando una chiamata API
  return hdFetch('/tickets?pageSize=1').then(()=>true).catch(()=>false);
}

function renderLogin(){
  $('app').innerHTML =
    '<div class="m-login">'+
      '<div class="m-login-logo">📱</div>'+
      '<div class="m-login-title">Yespresso HelpDesk</div>'+
      '<div class="m-login-sub">Versione mobile</div>'+
      '<form class="m-login-form" onsubmit="return doLogin(event)" action="/hd-login?next=%2Fm" method="POST">'+
        '<input class="m-login-input" type="password" name="pwd" id="login-pass" placeholder="Password" autocomplete="current-password" required autofocus>'+
        '<button class="m-login-btn" type="submit">Accedi</button>'+
        '<div class="m-login-error" id="login-err"></div>'+
      '</form>'+
    '</div>';
  setTimeout(()=>$('login-pass')?.focus(),100);
}

async function doLogin(ev){
  ev.preventDefault();
  const pwd=$('login-pass').value;
  const err=$('login-err');
  err.textContent='';
  try{
    const res=await fetch(PROXY+'/hd-login?next=%2Fm',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'pwd='+encodeURIComponent(pwd),
      credentials:'include',
      redirect:'manual'
    });
    // Se il login riesce il server setta cookie e fa redirect → ricarichiamo la pagina
    // (fetch non segue redirect se redirect:'manual')
    location.href='/m';
  }catch(e){
    // In caso di errore di rete, comunque proviamo a ricaricare la pagina
    // perché il cookie potrebbe essere stato settato
    location.href='/m';
  }
  return false;
}

async function doLogout(){
  try{
    await fetch(PROXY+'/hd-logout',{method:'POST'});
  }catch(e){}
  state.loggedIn=false;
  state.tickets=[];
  state.currentTicket=null;
  renderLogin();
}

// ═══ LOAD TICKETS ═══
async function loadTickets(){
  state.view='list';
  state.loading=true;
  renderList();
  // Carica in background la mappa giacenza-wa-sent (condivisa tra agenti)
  // Al completamento, re-renderizza la lista per far apparire i pallini verdi
  try { if(typeof window.loadGiacenzaWaSent === 'function') window.loadGiacenzaWaSent().then(function(){ try { renderList(); } catch(e){} }); } catch(e){}
  // Carica risposte rapide Temu (usate in renderDetailTemu)
  try { if(typeof loadQuickReplies === 'function') loadQuickReplies(); } catch(e){}
  try{
    // Carica ticket Open + Pending in parallelo
    const [openRes, pendingRes] = await Promise.all([
      hdFetch('/tickets?pageSize=50&page=1&status=open&sortBy=lastMessageAt&order=desc').catch(()=>[]),
      hdFetch('/tickets?pageSize=50&page=1&status=pending&sortBy=lastMessageAt&order=desc').catch(()=>[])
    ]);
    const openList=Array.isArray(openRes)?openRes:(openRes&&(openRes.tickets||openRes.data)||[]);
    const pendingList=Array.isArray(pendingRes)?pendingRes:(pendingRes&&(pendingRes.tickets||pendingRes.data)||[]);
    state.tickets=[...openList,...pendingList];
    // Dedupe
    const seen=new Set();
    state.tickets=state.tickets.filter(t=>{
      const id=t.ID||t.id;
      if(seen.has(id)) return false;
      seen.add(id); return true;
    });
    // Ordina per data più recente
    state.tickets.sort((a,b)=>new Date(b.lastMessageAt||b.updatedAt||0)-new Date(a.lastMessageAt||a.updatedAt||0));
  }catch(e){
    console.error('[loadTickets]',e);
    showToast('Errore caricamento: '+e.message,'error');
  }
  state.loading=false;
  renderList();
}

// ═══ RENDER LIST ═══
function renderList(){
  // Applica compattazione Amazon stesso ordine
  const amzGroups={};
  state.tickets.forEach(t=>{
    const email=(t.requester&&t.requester.email)||'';
    if(!email.includes('marketplace.amazon')) return;
    const m=(t.subject||'').match(/(\d{3}-\d{7}-\d{7})/);
    if(!m) return;
    const key=email+'|'+m[1];
    if(!amzGroups[key]) amzGroups[key]=[];
    amzGroups[key].push(t);
  });
  const hidden=new Set();
  const groupInfo={};
  Object.keys(amzGroups).forEach(k=>{
    const grp=amzGroups[k];
    if(grp.length<=1) return;
    grp.sort((a,b)=>new Date(b.lastMessageAt||b.updatedAt||0)-new Date(a.lastMessageAt||a.updatedAt||0));
    const main=grp.find(g=>g.status==='open'||g.status==='pending')||grp[0];
    const mainId=main.ID||main.id;
    grp.forEach(g=>{if((g.ID||g.id)!==mainId) hidden.add(g.ID||g.id);});
    groupInfo[mainId]={size:grp.length, orderNum:k.split('|')[1]};
  });

  let visible=state.tickets.filter(t=>!hidden.has(t.ID||t.id));

  // Applica search
  if(state.searchQuery){
    const q=state.searchQuery.toLowerCase();
    visible=visible.filter(t=>
      (t.subject||'').toLowerCase().includes(q) ||
      ((t.requester&&t.requester.name)||'').toLowerCase().includes(q) ||
      ((t.requester&&t.requester.email)||'').toLowerCase().includes(q)
    );
  }

  let html=
    '<div class="m-header">'+
      '<div class="m-header-title">📱 Yespresso Mobile</div>'+
      '<button class="m-logout" onclick="doLogout()">Esci</button>'+
    '</div>'+
    '<div class="m-search">'+
      '<input type="text" id="search-input" placeholder="Cerca per nome, email, oggetto..." value="'+h(state.searchQuery)+'" oninput="onSearchInput(this.value)">'+
    '</div>'+
    '<div class="m-counter">'+
      '<span>'+(state.loading?'⏳ Caricamento...':visible.length+' ticket'+(visible.length!==1?'s':'')+' aperti')+'</span>'+
      '<button class="m-counter-refresh" onclick="loadTickets()">🔄</button>'+
    '</div>'+
    '<div class="m-content" id="content">';

  if(state.loading){
    html+='<div class="m-loading"><div class="m-spinner"></div>Caricamento ticket...</div>';
  } else if(!visible.length){
    html+='<div class="m-empty">'+(state.searchQuery?'Nessun ticket per "'+h(state.searchQuery)+'"':'Nessun ticket aperto 🎉')+'</div>';
  } else {
    visible.forEach(t=>{
      const tid=t.ID||t.id;
      const name=(t.requester&&t.requester.name)||(t.requester&&t.requester.email)||'Cliente';
      const email=(t.requester&&t.requester.email)||'';
      const src=srcLabel(email);
      const time=timeAgo(t.lastMessageAt||t.updatedAt);
      const gi=groupInfo[tid];
      const amzBadge=gi?'<span class="m-badge m-badge-thread">🔗 +'+(gi.size-1)+'</span>':'';
      const statusBadge=t.status==='pending'?'<span class="m-badge m-badge-pending">⏳ Pending</span>':'<span class="m-badge m-badge-open">● Open</span>';
      // Pallino verde se c'è un invio WhatsApp giacenza per questo ticket (condiviso server)
      let waDot = '';
      try {
        const tShort = t.shortID || '';
        const tUuid = t.ID || t.id || '';
        if(window.isGiacenzaWaSent && (window.isGiacenzaWaSent(tShort) || window.isGiacenzaWaSent(tUuid))){
          const gwsMap = window.getGiacenzaWaSentMap ? window.getGiacenzaWaSentMap() : {};
          const gwsEntry = gwsMap[tShort] || gwsMap[tUuid] || {};
          let waWhen = '';
          if(gwsEntry.ts){
            const d = new Date(gwsEntry.ts);
            waWhen = d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
          }
          waDot = ' <span title="WhatsApp giacenza inviato'+(waWhen?' il '+waWhen:'')+'" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#25d366;margin-left:6px;vertical-align:middle;flex-shrink:0"></span>';
        }
      } catch(e){}
      html+=
        '<div class="m-ticket-row" onclick="openTicket(\''+tid+'\')">'+
          '<div class="m-ticket-head">'+
            '<div class="m-avatar" style="background:'+avatarColor(name)+'">'+initials(name)+'</div>'+
            '<div class="m-ticket-info">'+
              '<div class="m-ticket-name-row">'+
                '<div class="m-ticket-name">'+h(name)+waDot+'</div>'+
                '<div class="m-ticket-time">'+time+'</div>'+
              '</div>'+
              '<div class="m-ticket-subj">'+h(t.subject||'Senza oggetto')+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="m-ticket-badges">'+
            '<span class="m-badge '+src.cls+'">'+src.lbl+'</span>'+
            amzBadge+
            statusBadge+
          '</div>'+
        '</div>';
    });
  }

  html+='</div>';
  $('app').innerHTML=html;
}

// ═══ OPEN TICKET ═══
async function openTicket(tid){
  state.view='detail';
  state.currentTicket=state.tickets.find(t=>(t.ID||t.id)===tid);
  state.currentTicketFull=null;
  state.shopifyOrder=null;
  state.aiReply='';
  state.aiSummary='';
  state.sending=false;
  renderDetail();

  try{
    // Carica dettaglio completo + ordine Shopify in parallelo
    const [full, order] = await Promise.all([
      hdFetch('/tickets/'+tid).catch(e=>{console.warn('[full ticket]',e); return null;}),
      fetchShopifyOrderFromTicket(state.currentTicket).catch(e=>{console.warn('[shopify]',e); return null;})
    ]);
    state.currentTicketFull=full;
    state.shopifyOrder=order;
    renderDetail();
    // Genera riassunto AI in background
    generateSummary();
  }catch(e){
    showToast('Errore: '+e.message,'error');
  }
}

// Cerca ordine Shopify dal subject del ticket
async function fetchShopifyOrderFromTicket(t){
  if(!t) return null;
  const subj=t.subject||'';
  const email=(t.requester&&t.requester.email)||'';
  const allMsgText=((t.events||[]).map(ev=>(ev.message&&ev.message.text)||'').join(' ')).substring(0,5000);
  // Cerca numero ordine
  let orderNum='';

  // 1) Se è una giacenza BRT, usa il parser per estrarre l'ordine
  if(email.includes('brt.it') || email.includes('vasnoreply')){
    for(const ev of (t.events||[])){
      const txt = ev && ev.message && ev.message.text;
      if(!txt) continue;
      if(/APERTURA\s+GIACENZA/i.test(txt)){
        try{
          const g = parseBrtGiacenzaEmail(txt);
          if(g && g.ordineShopify){ orderNum = g.ordineShopify; break; }
        }catch(e){}
      }
    }
  }

  // 2) Pattern Shopify nel subject o nei messaggi: #NNNNNNN
  if(!orderNum){
    const shopMatch=(subj+' '+allMsgText).match(/#(\d{6,})/);
    if(shopMatch) orderNum=shopMatch[1];
  }

  // 3) Se ancora non trovato, prova email (solo canali non-marketplace)
  if(!orderNum && email && !email.includes('marketplace.amazon') && !email.includes('temu') && !email.includes('brt')){
    const d=await shopifyGet('orders.json?email='+encodeURIComponent(email)+'&status=any&limit=5');
    if(d&&d.orders&&d.orders.length){
      return d.orders.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    }
  }
  if(orderNum){
    const d=await shopifyGet('orders.json?name=%23'+orderNum+'&status=any');
    if(d&&d.orders&&d.orders.length) return d.orders[0];
  }
  return null;
}

// ═══ GENERATE AI SUMMARY ═══
async function generateSummary(){
  const t=state.currentTicketFull||state.currentTicket;
  if(!t||!t.events) return;
  // Prendi ultimo messaggio cliente
  const custMsgs=t.events.filter(e=>e.message&&e.message.text&&e.author&&e.author.type!=='agent');
  const agentMsgs=t.events.filter(e=>e.message&&e.message.text&&e.author&&e.author.type==='agent');
  if(!custMsgs.length){
    state.aiSummary='(nessun messaggio cliente)';
    const el=$('summary-text');
    if(el) el.textContent=state.aiSummary;
    return;
  }
  const lastCust=custMsgs[custMsgs.length-1].message.text.substring(0,1000);
  const ourReplies=agentMsgs.slice(-3).map(e=>e.message.text.substring(0,300)).join(' || ');
  const prompt='Sintetizza in 2 righe MASSIMO cosa chiede il cliente e cosa abbiamo già fatto. Stile telegrafico, italiano, riga 1 = richiesta cliente, riga 2 = cosa abbiamo già detto. Non usare liste.\n\nUltimo msg cliente: '+lastCust+'\n\nNostre risposte precedenti: '+(ourReplies||'nessuna');
  try{
    const res=await anthropicFetch({
      model:'claude-sonnet-4-5',
      max_tokens:200,
      messages:[{role:'user',content:prompt}]
    });
    if(!res){
      state.aiSummary='⚠️ AI non raggiungibile';
      const el=$('summary-text');
      if(el) el.textContent=state.aiSummary;
      return;
    }
    if(!res.ok){
      const errBody=await res.text();
      console.error('[summary AI]',res.status,errBody);
      state.aiSummary='⚠️ Errore AI: '+res.status;
      const el=$('summary-text');
      if(el) el.textContent=state.aiSummary;
      return;
    }
    const data=await res.json();
    const summary=(data.content&&data.content[0]&&data.content[0].text)||'';
    state.aiSummary=summary||'(riassunto vuoto)';
    const el=$('summary-text');
    if(el) el.textContent=state.aiSummary;
  }catch(e){
    console.warn('[summary]',e);
    state.aiSummary='⚠️ '+e.message;
    const el=$('summary-text');
    if(el) el.textContent=state.aiSummary;
  }
}

// ═══ GENERATE AI REPLY ═══
async function generateReply(){
  const t=state.currentTicketFull||state.currentTicket;
  if(!t) return;
  state.sending=true;
  renderDetail();

  try{
    const custMsgs=(t.events||[]).filter(e=>e.message&&e.message.text);
    const thread=custMsgs.map(e=>{
      const isAgent=e.author&&e.author.type==='agent';
      const role=isAgent?'AGENTE':'CLIENTE';
      return role+': '+e.message.text.substring(0,1000);
    }).join('\n---\n');

    const order=state.shopifyOrder;
    let orderCtx='';
    if(order){
      orderCtx='\n\nORDINE SHOPIFY: '+order.name+' · €'+order.total_price+' · stato: '+(order.fulfillment_status||'non spedito');
      if(order.shipping_address) orderCtx+=' · destinatario: '+order.shipping_address.name+', '+order.shipping_address.address1+' '+order.shipping_address.city;
    }

    const email=(t.requester&&t.requester.email)||'';
    const src=srcLabel(email);

    const prompt='Sei un assistente clienti di Yespresso (caffè e capsule). Rispondi al cliente in modo professionale, cordiale e preciso. Mantieni la risposta SINTETICA (adatta a mobile) ma completa. NON usare link esterni se il canale è Amazon.\n\nCANALE: '+src.lbl+orderCtx+'\n\nTHREAD:\n'+thread+'\n\nGenera una risposta professionale in italiano:';

    const res=await anthropicFetch({
      model:'claude-sonnet-4-5',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    });
    if(!res){
      throw new Error('AI non raggiungibile (timeout)');
    }
    if(!res.ok){
      const errBody=await res.text();
      console.error('[AI reply]',res.status,errBody);
      throw new Error('AI '+res.status+': '+errBody.substring(0,150));
    }
    const data=await res.json();
    const reply=(data.content&&data.content[0]&&data.content[0].text)||'';
    if(!reply) throw new Error('AI risposta vuota');
    state.aiReply=reply;
    state.sending=false;
    renderDetail();
    showToast('Risposta AI generata','success');
  }catch(e){
    console.error('[generateReply]',e);
    state.sending=false;
    renderDetail();
    showToast('Errore AI: '+e.message,'error');
  }
}

// ═══ REFORMULATE AI REPLY ═══
async function reformulateReply(){
  const currentText=$('reply-textarea')?.value||state.aiReply;
  if(!currentText.trim()){ showToast('Genera prima una risposta','error'); return; }
  const hints=prompt('Suggerimenti per riformulare:\n(es. tono più formale, più breve, aggiungi scuse)');
  if(!hints) return;
  state.sending=true;
  renderDetail();
  try{
    const p='Riformula questa risposta email seguendo questi suggerimenti: '+hints+'\n\nRisposta originale:\n'+currentText+'\n\nRispondi SOLO con la risposta riformulata.';
    const res=await anthropicFetch({
      model:'claude-sonnet-4-5',
      max_tokens:1000,
      messages:[{role:'user',content:p}]
    });
    if(!res) throw new Error('AI non raggiungibile');
    if(!res.ok){
      const errBody=await res.text();
      throw new Error('AI '+res.status+': '+errBody.substring(0,100));
    }
    const data=await res.json();
    state.aiReply=(data.content&&data.content[0]&&data.content[0].text)||currentText;
    state.sending=false;
    renderDetail();
    showToast('Riformulato','success');
  }catch(e){
    state.sending=false;
    renderDetail();
    showToast('Errore: '+e.message,'error');
  }
}

// ═══ SEND REPLY ═══
async function sendReply(){
  const t=state.currentTicket;
  if(!t) return;
  const tid=t.ID||t.id;
  const message=$('reply-textarea')?.value.trim();
  if(!message){ showToast('Scrivi una risposta','error'); return; }
  state.sending=true;
  renderDetail();
  try{
    // Invia messaggio (stesso pattern desktop)
    await hdFetch('/tickets/'+tid,{
      method:'PATCH',
      body:JSON.stringify({message:{text:message}})

    // Cambia stato a solved
    try{

      state.currentTicket=null;

    state.sending=false;
    renderDetail();
    showToast('Errore invio: '+e.message,'error');
  }
}

// ═══════════════════════════════════════════════════════════════════
// PARSER GIACENZA BRT MOBILE (identico al desktop)
// ═══════════════════════════════════════════════════════════════════
function parseBrtGiacenzaEmail(text){
  if(!text) return null;
  const t = text.replace(/\t/g,' ').replace(/[ \u00A0]{2,}/g,' ');
  const out = {};

  const pratica = t.match(/pratica\s+di\s+giacenza\s+N\.(\d{1,4})\s*\/\s*(\d{1,6})/i);
  if(pratica) out.pratica = pratica[1]+'-'+pratica[2];

  const dataApert = t.match(/in\s+data\s+(\d{2}\/\d{2}\/\d{4})/i);
  if(dataApert) out.dataApertura = dataApert[1];

  const motivo = t.match(/motivo\s*:\s*(\d{3})\s+([A-Z][A-Z0-9\s\/\.\-',]+?)(?:\n|Gli\s+estremi)/i);
  if(motivo){
    out.motivoCod = motivo[1];
    out.motivoDesc = motivo[2].trim().replace(/\s+AL\s*$/i,'').trim();
  }

  const tracking1 = t.match(/spedizione\s+(\d{4})\s+(\d{3})\s+(\d+)\s+(\d{5,})/i);
  if(tracking1){
    out.trackingFull = tracking1[1]+tracking1[2]+'0'+tracking1[3]+tracking1[4];
    out.trackingBreve = tracking1[4];
  } else {
    const tracking2 = t.match(/spedizione\s+(\d{13,18})/i);
    if(tracking2){
      out.trackingFull = tracking2[1];
      out.trackingBreve = tracking2[1].slice(-7);
    }
  }

  const riferimenti = t.match(/Riferimenti\s+mittente\s*:\s*(\d{6,12})(?:\s+(\d{6,12}))?/i);
  if(riferimenti){
    out.rifMittente1 = riferimenti[1];
    if(riferimenti[2]) out.ordineShopify = riferimenti[2];
  }

  const destinatario = t.match(/Destinatario\s*:\s*([A-Z][A-Z\s\.'àèéìòù]+?)\s*\n\s*([^\n]+?)\s*\n\s*(\d{5})\s+([A-Z\s]+?)\s+([A-Z]{2})\b/i);
  if(destinatario){
    out.destNome = destinatario[1].trim();
    out.destIndirizzo = destinatario[2].trim();
    out.destCap = destinatario[3];
    out.destCitta = destinatario[4].trim();
    out.destProv = destinatario[5];
  } else {
    const destFallback = t.match(/Destinatario\s*:\s*([A-Z][A-Z\s\.'àèéìòù]+?)(?:\n|PIAZZALE|VIA|CORSO|PIAZZA|VIALE)/i);
    if(destFallback) out.destNome = destFallback[1].trim();
  }

  const filiale = t.match(/Filiale\s+di\s+([A-Z][A-Z\s]+?)\n/i);
  if(filiale) out.filialeApertura = filiale[1].trim();

  const filialeCust = t.match(/custodita\s+presso\s+la\s+Ns\.\s+di[:\s]+([A-Z][A-Z\s]+?)(?:\n|\-\s|$)/i);
  if(filialeCust) out.filialeCustodia = filialeCust[1].trim();

  const dataRicons = t.match(/riconsegna\s+dal\s+(\d{2}\/\d{2}\/\d{4})/i);
  if(dataRicons) out.dataRiconsegna = dataRicons[1];

  const avviso = t.match(/(\d)°\s+Avviso/i);
  if(avviso) out.numAvviso = avviso[1];

  const link = t.match(/https?:\/\/vas\.brt\.it\/vas\/sped_det_show\.hsm\?[^\s<>"']+/i);
  if(link) out.linkPortale = link[0];

  if(out.trackingFull){
    out.urlTracking = 'https://vas.brt.it/vas/sped_det_show.hsm?referer=sped_numspe_par.htm&Nspediz='+out.trackingFull;
  }

  if(!out.pratica && !out.trackingFull && !out.ordineShopify) return null;
  return out;
}

// Rileva se il ticket corrente è una giacenza BRT (usa ultimo messaggio cliente)
function detectGiacenza(ticket){
  if(!ticket || !ticket.events) return null;
  for(let i = ticket.events.length-1; i >= 0; i--){
    const ev = ticket.events[i];
    const txt = ev && ev.message && ev.message.text;
    if(!txt) continue;
    if(/APERTURA\s+GIACENZA/i.test(txt) && /pratica\s+di\s+giacenza\s+N\./i.test(txt)){
      try{
        const g = parseBrtGiacenzaEmail(txt);
        if(g) return {data:g, rawText:txt};
      }catch(e){ console.warn('[giacenza parser]',e); }
    }
  }
  return null;
}

  const uid = 'gcz_m_'+Math.random().toString(36).slice(2);

// Recupera telefono cliente
function getGiacenzaPhoneMobile(){
  const order = state.shopifyOrder;
  if(!order) return '';
  const raw = (order.customer && order.customer.phone) ||
              (order.shipping_address && order.shipping_address.phone) ||
              (order.billing_address && order.billing_address.phone) || '';
  return String(raw||'').replace(/[^0-9+]/g,'').replace(/^\+/,'').replace(/^39/,'');
}

// Costruisce l'indirizzo attuale dall'ordine Shopify o dai dati giacenza
function buildIndirizzoAttualeMobile(g){
  const lines = [];
  const order = state.shopifyOrder;
  const sa = (order && order.shipping_address) || null;
  if(sa){
    if(sa.name) lines.push(sa.name);
    if(sa.company) lines.push(sa.company);
    const viaCiv = [sa.address1, sa.address2].filter(Boolean).join(', ');
    if(viaCiv) lines.push(viaCiv);
    const cittaCap = [sa.zip, sa.city, sa.province_code?'('+sa.province_code+')':''].filter(Boolean).join(' ');
    if(cittaCap) lines.push(cittaCap);
    if(sa.phone) lines.push('Tel: '+sa.phone);
    if(lines.length) return lines.join('\n');
  }
  if(g.destNome) lines.push(g.destNome);
  if(g.destIndirizzo) lines.push(g.destIndirizzo);
  const fallbackCap = [g.destCap, g.destCitta, g.destProv?'('+g.destProv+')':''].filter(Boolean).join(' ');
  if(fallbackCap) lines.push(fallbackCap);
  return lines.length ? lines.join('\n') : '';
}

// Costruisce messaggio WhatsApp basato sul motivo
function buildGiacenzaWaMessageMobile(g){
  const order = state.shopifyOrder;
  let nomePrimo = '';
  let ticketId = '';
  const t = state.currentTicket;
  if(t) ticketId = t.shortID || t.ID || t.id || '';

  if(order && order.shipping_address && order.shipping_address.name){
    nomePrimo = String(order.shipping_address.name).split(' ')[0];
  } else if(g.destNome){
    const parts = String(g.destNome).trim().split(/\s+/);
    const skip = ['PROF.','PROF','DR.','DR','SIG.','SIG','SIGRA','ING.','ING','AVV.','AVV'];
    for(let i=0; i<parts.length; i++){
      if(skip.indexOf(parts[i].toUpperCase()) < 0){ nomePrimo = parts[i]; break; }
    }
    if(nomePrimo) nomePrimo = nomePrimo.charAt(0).toUpperCase() + nomePrimo.substring(1).toLowerCase();
  }

  const saluto = nomePrimo ? ('Gentile '+nomePrimo+',') : 'Gentile Cliente,';
  const ordineNum = g.ordineShopify ? ('#'+g.ordineShopify) : '';

  const codice = (g.motivoCod || '').trim();
  const descUpper = String(g.motivoDesc || '').toUpperCase();
  let corpo = '';

  const isIndirizzoProblem =
    codice === '020' || codice === '022' ||
    descUpper.indexOf('SCONOSCIUTO') >= 0 ||
    descUpper.indexOf('INESISTENTE') >= 0 ||
    descUpper.indexOf('INCOMPLETO') >= 0;

  if(isIndirizzoProblem){
    const indirizzoAttuale = buildIndirizzoAttualeMobile(g);
    if(codice === '020' || descUpper.indexOf('SCONOSCIUTO') >= 0){
      corpo = 'il corriere BRT ci segnala che il destinatario risulta sconosciuto all\'indirizzo indicato per il suo ordine '+ordineNum+'.\n\n';
    } else {
      corpo = 'il corriere BRT ci segnala che l\'indirizzo indicato sul suo ordine '+ordineNum+' risulta incompleto o non trovato.\n\n';
    }
    if(indirizzoAttuale){
      corpo += 'Indirizzo attualmente in nostro possesso:\n'+indirizzoAttuale+'\n\n';
      corpo += 'Può gentilmente confermarci se l\'indirizzo è corretto o se dobbiamo integrare/modificare qualche dato? Ad esempio:\n'+
               '• Numero civico preciso\n'+
               '• Nome azienda o struttura\n'+
               '• Nome sul citofono\n'+
               '• Scala, interno o piano\n'+
               '• Numero di telefono per il corriere';
    } else {
      corpo += 'Per poter consegnare il pacco le chiediamo di inviarci i dati corretti:\n'+
               '• Indirizzo completo (via, numero civico)\n'+
               '• CAP, Città e Provincia\n'+
               '• Nome azienda o citofono (se presente)\n'+
               '• Numero di telefono per il corriere';
    }
  } else switch(codice){
    case '016':
      corpo = 'il corriere BRT ci segnala che la consegna del suo ordine '+ordineNum+' è stata posticipata su sua richiesta.\n\n'+
              'Per evitare che il pacco rientri in sede, le chiediamo di confermarci quando potremo riprogrammare la consegna e se l\'indirizzo inserito è corretto.';
      break;
    case '003':
    case '004':
    case '005':
      corpo = 'il corriere BRT ci segnala che durante il tentativo di consegna del suo ordine '+ordineNum+' non è stato trovato nessuno all\'indirizzo indicato.\n\n'+
              'Per procedere le chiediamo di indicarci se preferisce:\n'+
              '• Un nuovo tentativo di consegna (indicando giorno/fascia oraria)\n'+
              '• Il ritiro presso un Fermo!Point BRT vicino\n'+
              '• La modifica dell\'indirizzo di consegna';
      break;
    case '007':
      corpo = 'il corriere BRT ci segnala che il pacco del suo ordine '+ordineNum+' è stato rifiutato al momento della consegna.\n\n'+
              'Per capire come procedere le chiediamo gentilmente di comunicarci il motivo del rifiuto e se desidera comunque ricevere il pacco.';
      break;
    case '014':
    case '015':
      corpo = 'il suo ordine '+ordineNum+' è a sua disposizione presso il Fermo!Point BRT indicato dal corriere.\n\n'+
              'Le ricordiamo di ritirarlo entro i giorni indicati per evitare che il pacco rientri in sede.';
      break;
    default:
      corpo = 'il corriere BRT ci segnala un problema con la consegna del suo ordine '+ordineNum+'.\n\n'+
              'Motivo segnalato: '+(g.motivoDesc||'non specificato')+'\n\n'+
              'Per poter procedere le chiediamo di contattarci confermando come preferisce che gestiamo la spedizione.';
  }

  // Tracking "pulito": togli 2026 o 26 prefisso
  const trackingRaw = g.trackingFull || g.trackingBreve || '';
  const trackingPulito = String(trackingRaw).replace(/^(2026|26)/, '');
  const linkTracking = trackingPulito
    ? ('https://vas.brt.it/vas/sped_det_show.hsm?referer=sped_numspe_par.htm&Nspediz='+encodeURIComponent(trackingPulito))
    : '';

  let coda = '\n\nOrdine: '+ordineNum;
  if(trackingPulito) coda += '\nTracking BRT: '+trackingPulito;
  if(linkTracking) coda += '\n'+linkTracking;
  coda += '\n\nCordiali saluti\nYespresso';
  if(ticketId) coda += '\n\n#'+ticketId;

  return saluto+'\n\n'+corpo+coda;
}

// Handler bottone invio WhatsApp
window.inviaGiacenzaWaMobile = function(uid){
  const g = window._giacenzaData[uid];
  if(!g){ showToast('Dati giacenza non disponibili','error'); return; }
  const phone = getGiacenzaPhoneMobile();
  if(!phone){
    showToast('Telefono cliente non trovato. Attendi caricamento ordine.','error');
    return;
  }
  const messaggio = buildGiacenzaWaMessageMobile(g);
  const url = 'https://wa.me/39'+phone+'?text='+encodeURIComponent(messaggio);
  window.open(url, '_blank');
  window._giacenzaData[uid]._lastPhone = phone;
  // Salva lo stato "inviato" sul server (condiviso tra agenti)
  try {
    const t = state.currentTicket;
    if(t){
      const tidForStore = t.shortID || t.ID || t.id || '';
      if(tidForStore && typeof window.setGiacenzaWaSent === 'function'){
        window.setGiacenzaWaSent(tidForStore, phone);
      }
    }
  } catch(e){ console.warn('[GWS set]', e); }
  // Aggiorna UI: mostra bottoni Vedi/Annulla
  const box = document.getElementById('giacenza-wa-'+uid);
  if(box) box.innerHTML = renderGiacenzaWaSentMobile(uid);
};

window.vediGiacenzaWaMobile = function(uid){
  const d = window._giacenzaData[uid];
  if(d && d._lastPhone){
    window.open('https://wa.me/39'+d._lastPhone, '_blank');
    return;
  }
  // Fallback: prendi telefono dalla cache server
  try {
    const t = state.currentTicket;
    if(t){
      const ids = [t.shortID, t.ID, t.id].filter(Boolean);
      const map = window.getGiacenzaWaSentMap ? window.getGiacenzaWaSentMap() : {};
      for(const id of ids){
        const entry = map[id];
        if(entry && entry.phone){
          window.open('https://wa.me/39'+entry.phone, '_blank');
          return;
        }
      }
    }
  } catch(e){}
  showToast('Dati WA non disponibili','error');
};

window.annullaGiacenzaWaMobile = function(uid){
  // Rimuovi lo stato "inviato" dal server
  try {
    const t = state.currentTicket;
    if(t){
      const tidForStore = t.shortID || t.ID || t.id || '';
      if(tidForStore && typeof window.clearGiacenzaWaSent === 'function'){
        window.clearGiacenzaWaSent(tidForStore);
      }
    }
  } catch(e){ console.warn('[GWS clear]', e); }
  const box = document.getElementById('giacenza-wa-'+uid);
  if(box) box.innerHTML = renderGiacenzaWaButtonMobile(uid);
};

// Chiudi ticket giacenza (stato solved, senza inviare messaggio)
window.chiudiGiacenzaTicket = async function(){
  const t = state.currentTicket;
  if(!t) return;
  const tid = t.ID || t.id;
  try{
    await hdFetch('/tickets/'+tid, {method:'PATCH', body:JSON.stringify({status:'solved'})});
    t.status = 'solved';
    showToast('Ticket chiuso','success');
    setTimeout(()=>{
      state.view='list';
      state.currentTicket=null;
      state.tickets=state.tickets.filter(tk=>(tk.ID||tk.id)!==tid);
      renderList();
    },500);
  }catch(e){
    showToast('Errore: '+e.message,'error');
  }
};

// Copia testo risposta Temu in clipboard + toast
window.copyTemuQRMobile = function(qid){
  const text = (window._temuQRMobile||{})[qid] || '';
  if(!text){ showToast('Risposta non trovata','error'); return; }
  // Copia in clipboard (metodo moderno + fallback)
  const doCopy = function(){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text);
    }
    return new Promise((res,rej) => {
      try{
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        res();
      }catch(e){ rej(e); }
    });
  };
  doCopy().then(function(){
    showToast('✓ Risposta copiata. Incollala su Temu Seller Central','success');
  }).catch(function(e){
    showToast('Errore copia: '+e.message,'error');
  });
};

// Cerca ordine Shopify tramite PayPal Transaction ID (mobile)
async function findShopifyOrderByTxIdMobile(txId){
  if(!txId) return null;
  try{
    const d = await shopifyGet('orders.json?status=any&limit=10&query='+encodeURIComponent(txId));
    if(d && d.orders && d.orders.length){
      // Verifica match nei note_attributes
      for(const o of d.orders){
        const na = o.note_attributes || [];
        for(const attr of na){
          if(attr.value && String(attr.value).includes(txId)) return o;
        }
      }
      // Verifica nelle transazioni (se disponibile l'API)
      for(const o of d.orders){
        if(o.gateway === 'paypal' || (o.payment_gateway_names||[]).includes('paypal')){
          try{
            const tr = await shopifyGet('orders/'+o.id+'/transactions.json');
            if(tr && tr.transactions){
              for(const tx of tr.transactions){
                if(tx.receipt && JSON.stringify(tx.receipt).includes(txId)) return o;
                if(tx.authorization && String(tx.authorization).includes(txId)) return o;
              }
            }
          }catch(e){}
        }
      }
      // Fallback: primo risultato restituito da Shopify
      return d.orders[0];
    }
  }catch(e){ console.warn('[PayPal txId search mobile]', e.message); }
  return null;
}

function parsePayPalEmail(text){
  if(!text) return null;
  // Strip HTML (le email PayPal arrivano come HTML)
  let rawT = text;
  if(/<\/?(?:td|tr|table|body|html|div|p|br|span)\b/i.test(rawT)){
    rawT = rawT.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
               .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
               .replace(/<br\s*\/?>/gi,'\n')
               .replace(/<\/?(p|div|tr|h[1-6])\b[^>]*>/gi,'\n')
               .replace(/<[^>]+>/g,' ')
               .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
               .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
               .replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  }
  const t = rawT.replace(/\t/g,' ').replace(/[ \u00A0]{2,}/g,' ');
  const out = {};

  if(/hai\s+ricevuto\s+una\s+nuova\s+richiesta/i.test(t)) out.tipo = 'Nuova richiesta';
  else if(/come\s+procede\s+la\s+pratica/i.test(t)) out.tipo = 'Promemoria pratica';
  else if(/caso\s+chiuso/i.test(t)) out.tipo = 'Caso chiuso';
  else if(/richiesta\s+di\s+rimborso/i.test(t)) out.tipo = 'Richiesta rimborso';
  else if(/ha\s+aperto\s+una\s+controversia/i.test(t)) out.tipo = 'Controversia aperta';
  else out.tipo = 'Comunicazione PayPal';

  const clienteMatch = t.match(/([A-Z][a-zàèéìòù]+(?:\s+[A-Z][a-zàèéìòù]+)+)\s+(?:ha\s+riscontrato|ha\s+aperto|segnala)/);
  if(clienteMatch) out.cliente = clienteMatch[1].trim();

  const casoMatch = t.match(/(?:caso|controversia|case|pratica)\s*(?:N[.°]|n\.?|ID:?|#)?\s*([A-Z]{2}-[A-Z]-\d{3,}[-\s\d]*)/i);
  if(casoMatch) out.idCaso = casoMatch[1].trim().replace(/\s+/g,'');
  if(!out.idCaso){
    const altCaso = t.match(/\b(PP-[A-Z]-[\dA-Z-]+)\b/i);
    if(altCaso) out.idCaso = altCaso[1];
  }

  // ID Transazione PayPal: 17 char alfanumerici (es. 0MT78249S8228660K)
  let txMatch = t.match(/ID\s+(?:transazione|pagamento|operazione)[:\s]+([A-Z0-9]{15,20})/i);
  if(!txMatch) txMatch = t.match(/(?:numero\s+transazione|transaction\s+ID)[:\s]+([A-Z0-9]{15,20})/i);
  if(!txMatch){
    const allMatches = t.match(/\b([0-9][A-Z][A-Z0-9]{15}|[A-Z0-9]{17})\b/g);
    if(allMatches){
      for(const m of allMatches){
        if(/[A-Z]/.test(m) && /[0-9]/.test(m) && !(out.idCaso||'').includes(m)){
          out.idTransazione = m;
          break;
        }
      }
    }
  }
  if(txMatch && !out.idTransazione) out.idTransazione = txMatch[1];

  const importoMatch = t.match(/(?:€|EUR)\s*([\d.,]+)/);
  if(importoMatch) out.importo = importoMatch[1];
  const dataTxMatch = t.match(/Data\s+(?:della\s+)?transazione[:\s]+(\d{1,2}\s+[a-z]+\s+\d{4})/i);
  if(dataTxMatch) out.dataTransazione = dataTxMatch[1].trim();
  const scadenzaMatch = t.match(/(?:rispondi|risponda|hai|devi\s+rispondere)\s+(?:entro|al\s+più\s+tardi)\s+(?:il\s+|entro\s+il\s+)?(\d{1,2}[\s\/\.-]\s*[a-z0-9]+[\s\/\.-]\s*\d{2,4})/i);
  if(scadenzaMatch) out.scadenza = scadenzaMatch[1].trim();

  const motiviMap = [
    {re:/oggetto\s+non\s+ricevuto|non\s+ho\s+ricevuto/i, label:'Oggetto non ricevuto'},
    {re:/oggetto\s+(?:molto\s+)?diverso|non\s+corrispondente|non\s+conforme/i, label:'Oggetto non conforme'},
    {re:/transazione\s+non\s+autorizzata|pagamento\s+non\s+autorizzato/i, label:'Transazione non autorizzata'},
    {re:/rimborso\s+non\s+(?:effettuato|ricevuto)/i, label:'Rimborso non ricevuto'},
    {re:/articolo\s+danneggiato|prodotto\s+danneggiato/i, label:'Articolo danneggiato'},
    {re:/duplicato|addebit[oa]\s+duplicat/i, label:'Addebito duplicato'}
  ];
  for(const m of motiviMap){
    if(m.re.test(t)){ out.motivoTipo = m.label; break; }
  }

  const ordMatch = t.match(/(?:ordine|order|rif\.?|n[.°])\s*[#:]?\s*(\d{6,10})/i);
  if(ordMatch) out.ordineShopify = ordMatch[1];

  const linkMatch = t.match(/https?:\/\/(?:www\.)?paypal\.com[^\s<>"']+/i);
  if(linkMatch) out.linkPayPal = linkMatch[0];

  if(!out.idCaso && !out.idTransazione && !out.cliente && !out.importo) return null;
  return out;
}

// Rileva se il ticket è una comunicazione PayPal
function detectPayPal(ticket){
  if(!ticket || !ticket.events) return null;
  for(let i = ticket.events.length-1; i >= 0; i--){
    const ev = ticket.events[i];
    const txt = ev && ev.message && ev.message.text;
    if(!txt) continue;
    if(/paypal/i.test(txt) && (
       /hai\s+ricevuto\s+una\s+nuova\s+richiesta/i.test(txt) ||
       /come\s+procede\s+la\s+pratica/i.test(txt) ||
       /richiesta\s+di\s+rimborso/i.test(txt) ||
       /ha\s+aperto\s+una\s+controversia/i.test(txt) ||
       /caso\s+chiuso/i.test(txt) ||
       /ID\s+transazione/i.test(txt) ||
       /ID\s+controversia/i.test(txt))){
      try{
        const p = parsePayPalEmail(txt);
        if(p) return {data: p, rawText: txt};
      }catch(e){}
    }
  }
  return null;
}

// Indicatore colorato in base alle ore trascorse dall'ordine
// 🟢 < 6h | 🟡 < 24h | 🟠 < 72h | 🔴 >= 72h
function orderAgeIndicator(createdAt){
  if(!createdAt) return {emoji:'⚪', label:'?', color:'#888'};
  const ms = Date.now() - new Date(createdAt).getTime();
  const hours = ms / (1000*60*60);
  if(hours < 6) return {emoji:'🟢', label:Math.round(hours*10)/10+'h fa', color:'#16a34a', canEasyCancel:true};
  if(hours < 24) return {emoji:'🟡', label:Math.round(hours)+'h fa', color:'#ca8a04', canEasyCancel:true};
  if(hours < 72) return {emoji:'🟠', label:Math.round(hours/24*10)/10+'g fa', color:'#ea580c', canEasyCancel:false};
  const days = Math.round(hours/24);
  return {emoji:'🔴', label:days+'g fa', color:'#dc2626', canEasyCancel:false};
}

// Stato spedizione dell'ordine
function orderShipStatus(order){
  if(!order) return {key:'none', canCancel:false, canEditAddress:false, canContactBrt:false};
  if(order.cancelled_at) return {key:'cancelled', canCancel:false, canEditAddress:false, canContactBrt:false};
  const ff = (order.fulfillments||[])[0];
  const ss = ff && ff.shipment_status || '';
  const fs = order.fulfillment_status || '';
  // Non ancora spedito: si può annullare + modificare indirizzo su YesClo
  if(!ff || fs !== 'fulfilled'){
    return {key:'not_shipped', canCancel:true, canEditAddress:true, canContactBrt:false};
  }
  // Spedito ma non consegnato: modificare indirizzo via BRT
  if(ss === 'delivered') return {key:'delivered', canCancel:false, canEditAddress:false, canContactBrt:false};
  if(ss === 'failure') return {key:'failure', canCancel:false, canEditAddress:true, canContactBrt:true};
  if(ss === 'ready_for_pickup') return {key:'ready_for_pickup', canCancel:false, canEditAddress:false, canContactBrt:true};
  return {key:'shipped', canCancel:false, canEditAddress:true, canContactBrt:true};
}

// Categoria prodotto → aliquota IVA
// 10%: ginseng, orzo, cioccolata, nocciolino, tè limone, cortado, cappuccino
// 22%: resto (caffè, macchine, accessori)
function getIvaRateForLine(lineItem){
  if(!lineItem) return 22;
  const title = String(lineItem.title||'').toLowerCase();
  const sku = String(lineItem.sku||'').toLowerCase();
  const kw10 = ['ginseng','orzo','cioccolat','nocciolino','te limone','tè limone','cortado','cappuccino'];
  for(const k of kw10){ if(title.includes(k) || sku.includes(k)) return 10; }
  return 22;
}

// Calcola totale rimborso per N pezzi
function calcRefundAmount(order, quantity){
  if(!order || !order.line_items || !order.line_items.length) return {inc:'0.00', exc:'0.00', rate:22};
  // Usa il line_item principale (il primo)
  const li = order.line_items[0];
  const unitPrice = parseFloat(li.price||'0');
  const rate = getIvaRateForLine(li);
  const totalInc = unitPrice * (parseInt(quantity)||1);
  const totalExc = totalInc / (1 + rate/100);
  return {
    inc: totalInc.toFixed(2).replace('.',','),
    exc: totalExc.toFixed(2).replace('.',','),
    rate: rate
  };
}

window.confermaAnnullamento = async function(){
  const order = state.shopifyOrder;
  if(!order) return;
  const reason = document.getElementById('annulla-reason').value;
  const refund = document.getElementById('annulla-refund').checked;
  const notify = document.getElementById('annulla-notify').checked;

  if(!confirm('Confermare annullamento ordine '+(order.name||'')+'?\n\nRimborso: '+(refund?'SÌ':'NO')+'\nNotifica: '+(notify?'SÌ':'NO'))) return;

  try{
    const body = { reason, email: notify, refund };
    const r = await fetch(PROXY+'/shopify/cancel-order/'+order.id, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Proxy-Token':PROXY_TOKEN},
      body: JSON.stringify(body)
    });
    const result = await r.json();
    if(r.ok && result.ok){
      showToast('✓ Ordine annullato','success');
      // Chiudi modal
      const modal = document.querySelector('.modal-bg');
      if(modal) modal.remove();
      // Ricarica ordine
      setTimeout(()=>{ if(state.currentTicket) openTicket(state.currentTicket.ID||state.currentTicket.id); }, 800);
    } else {
      throw new Error(result.error||'Errore annullamento');
    }
  }catch(e){
    // Fallback: apri Shopify manuale
    if(confirm('Errore annullamento via API: '+e.message+'\n\nVuoi aprire Shopify per annullare manualmente?')){
      window.open('https://admin.shopify.com/store/yespresso-1/orders/'+order.id, '_blank');
    }
  }
};

window.copyBrtText = function(){
  const ta = document.getElementById('brt-text');
  if(!ta) return;
  const text = ta.value;
  const doCopy = navigator.clipboard && navigator.clipboard.writeText
    ? navigator.clipboard.writeText(text)
    : (function(){ ta.select(); document.execCommand('copy'); return Promise.resolve(); })();
  doCopy.then(()=>showToast('✓ Testo copiato','success')).catch(e=>showToast('Errore: '+e.message,'error'));
};

function renderImportiBoxMobile(){

  const email = (state.currentTicket && state.currentTicket.requester && state.currentTicket.requester.email || '').toLowerCase();
  const isAmazon = email.includes('marketplace.amazon');
  const lineItem = (order.line_items||[])[0];
  if(!lineItem) return '';
  const unitPrice = parseFloat(lineItem.price||'0');
  const totalQty = lineItem.quantity || 1;
  const rate = getIvaRateForLine(lineItem);
  const totalInc = unitPrice * totalQty;
  const totalExc = totalInc / (1 + rate/100);

  const qtyField = 'imp-qty-'+Math.random().toString(36).slice(2,6);

  let html = '<div style="background:#f8f9fc;border-radius:10px;padding:12px;margin-bottom:10px">';

  html += '<div style="font-size:16px;font-weight:700;color:#166534" id="imp-inc-'+qtyField+'">€ '+totalInc.toFixed(2).replace('.',',')+'</div>';
  html += '<div style="font-size:9px;color:#166534">(IVA inclusa)</div>';
  html += '</div>';
  html += '<button onclick="copyImportoMobile(document.getElementById(\'imp-inc-'+qtyField+'\').textContent.replace(\'€ \',\'\').trim())" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📋 Copia</button>';
  html += '</div>';

  if(isAmazon){
    html += '<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<div>';
    html += '<div style="font-size:10px;color:#9a3412;font-weight:600;text-transform:uppercase">Amazon IVA esclusa</div>';
    html += '<div style="font-size:16px;font-weight:700;color:#9a3412" id="imp-exc-'+qtyField+'">€ '+totalExc.toFixed(2).replace('.',',')+'</div>';

    html += '<button onclick="copyImportoMobile(document.getElementById(\'imp-exc-'+qtyField+'\').textContent.replace(\'€ \',\'\').trim())" style="background:#ea580c;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">📋 Copia</button>';

  html += '</div>';
  return html;

window.updateImportiMobile = function(qtyField, unitPriceStr, rate){
  const qty = parseInt(document.getElementById(qtyField).value)||1;
  const unitPrice = parseFloat(unitPriceStr);
  const inc = unitPrice * qty;
  const exc = inc / (1 + rate/100);
  const incEl = document.getElementById('imp-inc-'+qtyField);
  const excEl = document.getElementById('imp-exc-'+qtyField);
  if(incEl) incEl.textContent = '€ '+inc.toFixed(2).replace('.',',');
  if(excEl) excEl.textContent = '€ '+exc.toFixed(2).replace('.',',');
};

window.copyImportoMobile = function(val){
  const doCopy = navigator.clipboard && navigator.clipboard.writeText
    ? navigator.clipboard.writeText(val)
    : Promise.resolve();
  doCopy.then(()=>showToast('✓ Importo copiato: '+val,'success')).catch(e=>showToast('Errore: '+e.message,'error'));
};

  const order = state.shopifyOrder;
  if(!order) return '';
  const ff = (order.fulfillments||[])[0];
  if(!ff) return '';
  const ss = ff.shipment_status || '';
  const tn = ff.tracking_number || '';
  const tnClean = tn.replace(/^(2026|26)/,'');
  const brtUrl = tn ? 'https://vas.brt.it/vas/sped_det_show.hsm?referer=sped_numspe_par.htm&Nspediz='+tn : '';

  // Pronto al ritiro: suggerisce messaggio con punto ritiro
  if(ss === 'ready_for_pickup'){
    const sa = order.shipping_address||{};
    const nomePrimo = (sa.first_name||sa.name||'').split(' ')[0];
    const msg = 'Gentile '+(nomePrimo||'Cliente')+',\n\n'+
      'il suo ordine '+(order.name||'')+' è pronto per il ritiro presso il Fermo!Point BRT.\n\n'+
      'Le consigliamo di ritirarlo entro i giorni indicati per evitare che il pacco rientri in sede.\n\n'+
      'Tracking: '+tnClean+'\n'+brtUrl+'\n\n'+
      'Cordiali saluti\nYespresso';
    let html = '<div style="background:#fef3c7;border:1.5px solid #fde68a;border-radius:10px;padding:12px;margin-bottom:10px">';
    html += '<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px">📬 Pacco pronto al ritiro</div>';
    html += '<div style="font-size:11px;color:#92400e;margin-bottom:10px;line-height:1.4">Il pacco è disponibile al Fermo!Point. Invia messaggio di sollecito ritiro al cliente.</div>';
    html += '<button onclick="usaMessaggioReadyMobile(\''+btoa(unescape(encodeURIComponent(msg)))+'\')" style="display:block;width:100%;background:#ca8a04;color:#fff;padding:10px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit">📝 Usa messaggio sollecito ritiro</button>';
    html += '</div>';
    return html;
  }

  // Problema spedizione: suggerisce 6 risposte preconfezionate
  if(ss === 'failure'){
    const problemi = [
      {label:'Indirizzo non trovato', msg:'L\'indirizzo risulta non trovato dal corriere. Può confermarci l\'indirizzo esatto con riferimenti (civico, scala, citofono)?'},
      {label:'Destinatario assente', msg:'Il corriere non ha trovato nessuno all\'indirizzo. Preferisce una riconsegna in un giorno/orario specifico, o il ritiro presso un Fermo!Point vicino?'},
      {label:'Accesso limitato', msg:'Il corriere segnala difficoltà di accesso all\'indirizzo. Possiamo programmare una consegna alternativa o il ritiro in Fermo!Point?'},
      {label:'Rifiutato', msg:'Il pacco è stato rifiutato al momento della consegna. Può comunicarci il motivo del rifiuto e se desidera comunque ricevere il prodotto?'},
      {label:'Furto/Danneggiamento', msg:'Il corriere segnala un problema con il pacco. Stiamo verificando con BRT e la terremo aggiornata appena avremo dettagli.'},
      {label:'Contattare destinatario', msg:'Il corriere ha bisogno di contattarla per la consegna. Può confermarci un numero di telefono raggiungibile?'}
    ];
    let html = '<div style="background:#fee2e2;border:1.5px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:10px">';
    html += '<div style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:8px">❌ Problema spedizione</div>';
    html += '<div style="font-size:11px;color:#991b1b;margin-bottom:10px">Il corriere ha segnalato un problema. Seleziona la risposta più adatta:</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
    problemi.forEach((p,i) => {
      const encMsg = btoa(unescape(encodeURIComponent(p.msg)));
      html += '<button onclick="usaMessaggioProblemaMobile(\''+encMsg+'\')" style="background:#fff;border:1px solid #fca5a5;color:#991b1b;border-radius:6px;padding:8px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;line-height:1.3">'+h(p.label)+'</button>';
    });
    html += '</div></div>';
    return html;
  }

  return '';
}

window.usaMessaggioReadyMobile = function(encMsg){
  const msg = decodeURIComponent(escape(atob(encMsg)));
  state.aiReply = msg;
  renderDetail();
};

window.usaMessaggioProblemaMobile = function(encMsg){
  const msg = decodeURIComponent(escape(atob(encMsg)));
  // Prepend saluto
  const sa = state.shopifyOrder && state.shopifyOrder.shipping_address;
  const nomePrimo = sa && (sa.first_name || (sa.name||'').split(' ')[0]) || '';
  const full = 'Gentile '+(nomePrimo||'Cliente')+',\n\n'+msg+'\n\nCordiali saluti\nYespresso';
  state.aiReply = full;
  renderDetail();
};
